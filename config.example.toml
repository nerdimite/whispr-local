# Copy to ~/.config/whispr/config.toml and edit. Every field is optional;
# omitted fields fall back to the defaults shown here.

# "NPU" (default, auto-falls-back to CPU if the NPU won't initialize) or "CPU".
device = "NPU"

# Exported OpenVINO Whisper model dir. Default: ~/.local/share/whispr/models/whisper-base
# whisper-small is more accurate and still ~0.3s/utterance on the NPU — export it with
# `scripts/export-model.sh openai/whisper-small` and point model_path at it:
# model_path = "~/.local/share/whispr/models/whisper-small"

# OpenVINO compile cache — makes Daemon restarts fast. Default: ~/.cache/whispr/ov
# cache_dir = "~/.cache/whispr/ov"

# Desktop notifications (recording / transcribing / no-speech / CPU-fallback).
notify = true

# Debug: dump the last captured audio to <cache_dir>/last_recording.wav.
dump_last_recording = false

# Capture device: omit/null = system default, an integer index, or a name substring
# (e.g. "Digital Microphone"). Pin this if a bluetooth headset keeps stealing the
# default input and feeding whispr silence. See `whispr devices` for the list.
# This is the STARTUP device — switch it live from the tray's "Microphone" submenu
# or with `whispr set-device <index>` (see `whispr devices`); those don't persist.
# input_device = "pipewire"

# Bluetooth headsets can't do hi-fi playback (A2DP) and mic capture at once — the
# mic only exists in the HFP/HSP "headset" profile. With this on (default), whispr
# flips a BT headset into that profile just for the recording and restores it after,
# so you can dictate into a headset without touching system sound settings. Needs
# PipeWire's `wpctl`/`pw-dump`. Set false to manage the profile yourself.
# bluetooth_autoswitch = true

# Silence gate: a capture is dropped as "no speech" only if BOTH its rms is below
# silence_threshold AND its loudest sample is below peak_threshold. The peak clause
# rescues quiet mics — a Bluetooth headset in HFP mode captures speech as brief loud
# peaks over a low average, so an rms-only gate wrongly drops it. Watch the daemon's
# logged `rms=`/`peak=` for a real utterance vs. ambient and tune from there.
# silence_threshold = 0.02
# peak_threshold = 0.05

# Peak-normalize a real capture (after the gate) so quiet mics are lifted to a level
# Whisper hears clearly instead of you having to speak right into the mic. Boost-only,
# capped, preserves signal-to-noise. Set false to feed Whisper the raw capture.
# normalize_audio = true

# --- Dictation copilot (rewrite stage, docs/ROADMAP.md) ----------------------
# Post-transcription cleanup + vocabulary correction by a cloud LLM (OpenAI).
# NOTE: this sends the transcript OFF the machine — on-device Gemma is the goal
# but is deferred (OOMs on this box). The daemon falls back to the raw transcript
# whenever the API is down or slow, so this can never lose a dictation.
# Provide a key: put OPENAI_API_KEY in ~/.config/whispr/whispr.env (chmod 600),
# or set openai_api_key below.
rewrite = false

# Domain terms / proper nouns the rewrite corrects mis-hearings toward. For a
# name pronounced unlike its spelling, add a spoken-form hint so Whisper's version
# maps back to it: "Canonical (pronounced <what you hear>)".
# vocabulary = ["git", "OpenVINO", "CellStrat", "Sasi (pronounced Shashi)"]

# Opt-in screen-context vision (NOT captured/sent unless enabled; off by default).
screen_context = false

# gpt-5.4-nano @ effort "none" is the fast default; gpt-5.4-mini / "low" is more
# accurate but slower.
# rewriter_model = "gpt-5.4-nano"
# rewrite_effort = "none"
# openai_api_key = "sk-..."   # prefer ~/.config/whispr/whispr.env instead
# rewrite_timeout = 10.0      # seconds; past this the raw transcript is pasted
